name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y nasm libcurl4-openssl-dev libmbedtls-dev

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-04

      - name: Print Odin version
        run: odin version

      - name: Run tests
        run: make test
